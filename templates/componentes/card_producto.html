<div class="card producto-card border-0 shadow h-100">

    <!-- ============================== -->
    <!-- IMAGEN -->
    <!-- ============================== -->

    <div class="position-relative">

        {% if manga.imagen %}

            <img
                src="{{ manga.imagen.url }}"
                class="card-img-top producto-imagen"
                alt="{{ manga.nombre }}">

        {% else %}

            <img
                src="https://placehold.co/400x600?text=MangaVerse"
                class="card-img-top producto-imagen"
                alt="Sin imagen">

        {% endif %}

        <!-- Favoritos (preparado para futuro) -->

        <button
            class="btn btn-light rounded-circle shadow favorito-btn"
            disabled>

            ❤️

        </button>

        <!-- Categoría -->

        <span
            class="badge bg-warning text-dark categoria-badge">

            {{ manga.categoria }}

        </span>

    </div>

    <!-- ============================== -->
    <!-- CUERPO -->
    <!-- ============================== -->

    <div class="card-body d-flex flex-column">

        <h5 class="fw-bold">

            {{ manga.nombre }}

        </h5>

        <div class="mb-2">

            ⭐⭐⭐⭐⭐

        </div>

        <p class="text-muted small">

            {{ manga.descripcion|truncatewords:12 }}

        </p>

        <div class="mt-auto">

            <h3 class="precio">

                ${{ manga.precio }}

            </h3>

            {% if manga.stock > 0 %}

                <span class="badge bg-success">

                    ✔ Stock disponible

                </span>

            {% else %}

                <span class="badge bg-danger">

                    Agotado

                </span>

            {% endif %}

        </div>

    </div>

    <!-- ============================== -->
    <!-- BOTONES -->
    <!-- ============================== -->

    <div class="card-footer bg-white border-0">

        <div class="d-grid gap-2">

            <a
                href="{% url 'detalle_manga' manga.id %}"
                class="btn btn-primary">

                Ver detalle

            </a>

            <a
                href="{% url 'agregar_carrito' manga.id %}"
                class="btn btn-warning">

                🛒 Agregar al carrito

            </a>

        </div>

    </div>

</div>
